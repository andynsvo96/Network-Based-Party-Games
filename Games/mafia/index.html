<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Mafia Party Game – Host</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #020617;
      --bg-alt: #020617;
      --card: #020617;
      --accent: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --muted: #9ca3af;
      --border-subtle: #1f2937;
      --border-strong: #374151;
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --radius-lg: 18px;
      --radius-xl: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #111827 0, #020617 55%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 12px;
    }

    .frame {
      width: 100%;
      max-width: 1920px;
      height: 100%;
      max-height: 1080px;
      border-radius: 32px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: radial-gradient(circle at top, #020617 0, #020617 50%, #000 100%);
      display: flex;
      flex-direction: column;
      padding: 12px 18px;
      position: relative;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(31, 41, 55, 0.95);
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-icon {
      width: 36px;
      height: 36px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 0, #facc15, #f97316);
      font-size: 22px;
    }

    .title-text-main {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .title-sub {
      font-size: 13px;
      color: var(--text-soft);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .connection-instructions {
      margin-top: 4px;
      font-size: 15px;
      color: #e5e7eb;
    }

    .connection-instructions span {
      color: #facc15;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.8);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.96);
      color: #e5e7eb;
    }

    .badge.phase {
      border-color: rgba(245, 158, 11, 0.9);
      color: #facc15;
    }

    .badge.counter {
      border-color: rgba(96, 165, 250, 0.9);
      color: #bfdbfe;
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      font-size: 12px;
      background: rgba(15, 23, 42, 0.96);
      color: var(--text-soft);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.96);
      color: #e5e7eb;
      border: 1px solid rgba(55, 65, 81, 0.95);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: background 0.12s ease, border-color 0.12s ease, opacity 0.12s ease;
    }

    button:hover:not(:disabled) {
      background: rgba(31, 41, 55, 0.98);
      border-color: rgba(148, 163, 184, 0.9);
    }

    button:active:not(:disabled) {
      background: rgba(17, 24, 39, 0.98);
    }

    button.primary {
      background: #facc15;
      color: #111827;
      border-color: #facc15;
    }

    button.primary:hover:not(:disabled) {
      background: #fbbf24;
      border-color: #fbbf24;
    }

    button.danger {
      background: rgba(127, 29, 29, 0.95);
      border-color: rgba(248, 113, 113, 0.9);
      color: #fecaca;
    }

    button.small {
      padding: 6px 10px;
      font-size: 12px;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 30% 40% 30%;
      gap: 14px;
      margin-top: 12px;
    }

    .intro-layout {
      grid-template-columns: 100%;
    }

    /* INTRO: hide the Players (top) and Details/Vote Controls (bottom) sections */
    .intro-layout>section:nth-child(1),
    .intro-layout>section:nth-child(3) {
      display: none;
    }


    .lobby-layout {
      grid-template-columns: 58% 42%;
    }

    .results-layout {
      grid-template-columns: 50% 50%;
    }

    /* Hide the right column in game results (2 columns only) */
    .results-layout>section:nth-child(3) {
      display: none;
    }

    /* Hide the center column in lobby */
    .lobby-layout>section:nth-child(2) {
      display: none;
    }


    .column {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .column-title {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-soft);
    }

    .card {
      background: rgba(15, 23, 42, 0.98);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(31, 41, 55, 0.96);
      padding: 16px 16px 14px;
    }

    .card+.card {
      margin-top: 10px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .card-header-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .accent-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #facc15;
    }

    .small-text {
      font-size: 13px;
      color: var(--text-soft);
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 9px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(31, 41, 55, 0.96);
      font-size: 14px;
    }

    /* Lobby players list with breakdown columns */
    .players-list.points-breakdown {
      gap: 4px;
    }

    .player-row.stats {
      display: grid;
      grid-template-columns: 1.6fr 0.65fr 0.65fr 0.65fr 0.65fr 0.65fr 0.9fr 1.0fr 0.8fr;
      gap: 10px;
      align-items: center;
    }

    .kick-btn {
      padding: 4px 8px;
      font-size: 11px;
      background: rgba(127, 29, 29, 0.95);
      border-color: rgba(248, 113, 113, 0.9);
      color: #fecaca;
    }

    .kick-btn:hover:not(:disabled) {
      background: rgba(153, 27, 27, 0.95);
    }

    .player-row.stats.header {
      background: transparent;
      border: none;
      padding: 0 9px 6px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .player-cell {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-cell.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }


    .player-row .name {
      font-weight: 500;
    }

    .player-row.disconnected {
      opacity: 0.5;
    }

    .player-row.player-never-joined {
      display: none;
    }

    .player-tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(55, 65, 81, 0.96);
      color: var(--text-soft);
    }

    .player-tag.connected {
      border-color: rgba(34, 197, 94, 0.9);
      color: #bbf7d0;
    }

    .player-tag.dead {
      border-color: rgba(248, 113, 113, 0.9);
      color: #fecaca;
    }

    .player-tag.pending {
      border-color: rgba(234, 179, 8, 0.9);
      color: #facc15;
    }

    .player-tag.done {
      border-color: rgba(34, 197, 94, 0.9);
      color: #bbf7d0;
    }

    .voted-for {
      margin-left: 10px;
      font-size: 13px;
      color: var(--text-soft);
    }

    .roles-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 8px 12px;
      align-items: center;
      margin-top: 6px;
    }

    .roles-grid label {
      font-size: 14px;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .role-pill {
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(55, 65, 81, 0.96);
      color: var(--text-soft);
    }

    .role-pill.role-pill-mafia {
      border-color: rgba(248, 113, 113, .9);
      color: #fecaca;
    }

    .role-pill.role-pill-civilian {
      border-color: rgba(234, 179, 8, .9);
      color: #fde68a;
    }

    .role-pill.role-pill-doctor {
      border-color: rgba(34, 197, 94, .9);
      color: #bbf7d0;
    }

    .role-pill.role-pill-boxer {
      border-color: rgba(168, 85, 247, .9);
      color: #e9d5ff;
    }

    .role-pill.role-pill-detective {
      border-color: rgba(96, 165, 250, .9);
      color: #bfdbfe;
    }


    .roles-grid input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: rgba(15, 23, 42, 0.98);
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
      text-align: center;
    }

    .roles-grid input[type="number"]:focus {
      border-color: #f59e0b;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .summary-row span {
      color: var(--text-soft);
    }

    .summary-row strong {
      color: #e5e7eb;
      font-weight: 600;
    }

    .chip {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(55, 65, 81, 0.96);
      color: var(--text-soft);
    }

    .join-url-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .join-url-box {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(55, 65, 81, 0.96);
      background: rgba(15, 23, 42, 0.98);
      font-size: 14px;
      color: #e5e7eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hint {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-soft);
    }

    .hint strong {
      color: #e5e7eb;
    }

    .error-banner {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(248, 113, 113, 0.9);
      background: rgba(127, 29, 29, 0.9);
      color: #fecaca;
      font-size: 13px;
    }

    .settings-toggle-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
    }

    .toggle-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #e5e7eb;
    }

    .toggle-line small {
      color: var(--text-soft);
      font-size: 12px;
    }

    .toggle-line input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #facc15;
    }

    .inline-input {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .inline-input input[type="number"] {
      width: 90px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: rgba(15, 23, 42, 0.98);
      color: #e5e7eb;
      font-size: 13px;
      text-align: center;
    }

    .inline-input.disabled {
      opacity: 0.45;
    }

    .inline-input input[type="number"]:focus {
      border-color: #f59e0b;
    }

    /* Intro */

    .intro-track {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      height: 100%;
    }

    .intro-card {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .intro-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .intro-image {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      object-fit: cover;
      margin-bottom: 4px;
    }

    .intro-footer {
      position: absolute;
      right: 24px;
      bottom: 22px;
      display: none;
      gap: 12px;
      align-items: center;
    }

    .intro-step-indicators {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .intro-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: 1px solid rgba(55, 65, 81, 0.98);
      background: rgba(15, 23, 42, 0.98);
    }

    .intro-dot.active {
      border-color: #fbbf24;
      background: #fbbf24;
    }

    .intro-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Settings overlay */
    .overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .overlay-backdrop.visible {
      display: flex;
    }

    .overlay-panel {
      width: 520px;
      max-width: 90%;
      max-height: 90%;
      background: rgba(15, 23, 42, 0.98);
      border-radius: 24px;
      border: 1px solid rgba(55, 65, 81, 0.95);
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .overlay-header h2 {
      margin: 0;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .overlay-body {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .overlay-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .overlay-section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-soft);
      margin-top: 8px;
      margin-bottom: 4px;
    }

    /* Utility text colors */
    .text-yellow {
      color: #facc15;
      font-weight: 700;
    }

    .text-red {
      color: var(--danger);
      font-weight: 700;
    }

    .text-green {
      color: var(--success);
      font-weight: 700;
    }

    .toggle-state {
      font-weight: 700;
    }

    .toggle-state.on {
      color: var(--success);
    }

    .toggle-state.off {
      color: var(--danger);
    }

    /* Day summary readability (TV-friendly) */
    .day-summary-card {
      text-align: center;
    }

    .day-summary-text {
      font-size: 22px;
      line-height: 1.5;
    }

    .day-summary-text p {
      margin: 10px 0;
    }

    .day-summary-text ul {
      margin: 10px 0 0 0;
      padding-left: 18px;
      text-align: left;
      display: inline-block;
    }

    .day-summary-text li {
      margin: 8px 0;
    }

    /* Results highlights */
    .results-name {
      color: #facc15;
      font-weight: 800;
    }

    .num-pos {
      color: var(--success);
      font-weight: 700;
    }

    .num-neg {
      color: var(--danger);
      font-weight: 700;
    }


    .alibi-notes {
      margin-top: 6px;
    }

    .alibi-line {
      margin: 6px 0;
      font-size: 22px;
      line-height: 1.25;
    }

    @keyframes dangerBlink {

      0%,
      49% {
        color: var(--danger);
      }

      50%,
      100% {
        color: var(--text);
      }
    }

    .timer-critical {
      animation: dangerBlink 1s steps(1, end) infinite;
    }

    .playerStatusCircle {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    .playerStatusCircle.online { background: #10b981; }
    .playerStatusCircle.offline {
      background: transparent;
      border: 2px solid #6b7280;
    }
  </style>
</head>

<body>
  <div class="frame">
    <header>
      <div class="header-left">
        <div class="title-row">
          <div class="title-icon">🂡</div>
          <div>
            <div class="title-text-main">Mafia, the party game</div>
            <div class="title-sub">Host Console</div>
          </div>
        </div>
        <!-- Players join through the main launcher only -->
        <span id="connectionUrlInline" style="display:none;"></span>
      </div>
      <div class="header-right">
        <div class="stat-row">
          <div class="badge phase" id="phaseBadge">LOBBY</div>
          <div class="badge counter" id="dayNightBadge">Day 0 · Night 0</div>
        </div>
        <div class="stat-row">
          <div class="pill">
            <span class="dot"></span>
            <span id="playerCountLabel">0 players connected</span>
          </div>
          <div class="top-buttons">
            <button id="settingsBtn" class="small">Settings</button>
            <button id="endGameBtn" class="small danger" style="display:none;">
              End Game
            </button>
            <button id="returnToLauncherBtn" class="small" style="background:#ef4444;color:white;">Exit to Launcher</button>
          </div>
        </div>
      </div>
    </header>

    <main id="mainLayout">
      <!-- Left column -->
      <section class="column">
        <div class="column-title">Players</div>
        <div class="column-body" id="leftColumn"></div>
      </section>

      <!-- Center column -->
      <section class="column">
        <div class="column-title" id="centerTitle">Main Controls</div>
        <div class="column-body" id="centerColumn"></div>
      </section>

      <!-- Right column -->
      <section class="column">
        <div class="column-title" id="rightTitle">Details</div>
        <div class="column-body" id="rightColumn"></div>
      </section>
    </main>

    <!-- Intro footer (bottom right) -->
    <div class="intro-footer" id="introFooter">
      <div class="intro-step-indicators">
        <div class="intro-dot" id="introDot1"></div>
        <div class="intro-dot" id="introDot2"></div>
        <div class="intro-dot" id="introDot3"></div>
      </div>
      <div class="intro-actions">
        <button id="introEndBtn" class="small danger">End Game</button>
        <button id="introActionBtn" class="primary small">Start Game</button>
      </div>
    </div>

    <!-- Settings overlay -->
    <div class="overlay-backdrop" id="settingsOverlay">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2><span class="accent-dot"></span>Game Settings</h2>
          <button id="closeSettingsBtn" class="small">Close</button>
        </div>
        <div class="overlay-body" id="settingsContent"></div>
        <div class="overlay-footer">
          <span class="small-text">
            Changes are applied immediately.
          </span>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const PHASES = {
      LOBBY: "lobby",
      INTRO: "intro",
      NIGHT: "night",
      DAY: "day",
      VOTE: "vote",
      RESULTS: "results",
    };

    const SKIP_VOTE = "SKIP_VOTE";

    let socket = null;

    let hostInfo = {
      ip: null,
      port: null,
      joinUrl: "",
    };

    let phase = PHASES.LOBBY;
    let day = 0;
    let night = 0;

    let settings = {
      mafia: 1,
      doctor: 1,
      detective: 1,
      boxer: 0,
      civilian: 3,
      anonymousVoting: false,
      timedVote: false,
      voteDurationSeconds: 60,
      mafiaCanSkipKill: false,
      detectiveRememberMafia: true,
      allowMafiaVoteMafia: false,
    };

    function titleCaseName(name) {
      const s = (name || "").trim();
      if (!s) return "(unnamed)";
      return s
        .split(/\s+/)
        .map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
        .join(" ");
    }

    function formatOnOff(isOn) {
      return `<span class="toggle-state ${isOn ? "on" : "off"}">${isOn ? "ON" : "OFF"}</span>`;
    }


    function updateVoteTimerDisplay() {
      const el = document.getElementById("voteTimerValue");
      if (!el) return;
      if (!settings.timedVote || !voteTimerEnd) {
        el.classList.remove("timer-critical");
        return;
      }
      const now = Date.now();
      const diff = Math.max(0, Math.floor((voteTimerEnd - now) / 1000));
      el.textContent = String(diff);
      if (diff <= 10) el.classList.add("timer-critical");
      else el.classList.remove("timer-critical");
    }

    function syncVoteTicker() {
      const shouldRun = (phase === PHASES.VOTE) && settings.timedVote && !!voteTimerEnd;
      if (shouldRun && !voteTicker) {
        // tick fast enough to feel responsive, but light enough to not spam layout
        voteTicker = setInterval(updateVoteTimerDisplay, 250);
      } else if (!shouldRun && voteTicker) {
        clearInterval(voteTicker);
        voteTicker = null;
      }
      // Always do an immediate paint if we're in vote.
      if (phase === PHASES.VOTE) updateVoteTimerDisplay();
    }



    function getPointsDetail(p) {
      return (p && p.pointsDetail) ? p.pointsDetail : {};
    }

    function getOverallPoints(p) {
      const d = getPointsDetail(p);
      if (typeof d.total === "number") return d.total;

      // fallback if total isn't provided
      const mafia = typeof d.mafia === "number" ? d.mafia : 0;
      const civ = typeof d.civilian === "number" ? d.civilian : 0;
      const det = typeof d.detective === "number" ? d.detective : 0;
      const doc = typeof d.doctor === "number" ? d.doctor : 0;
      const boxer = typeof d.boxer === "number" ? d.boxer : 0;
      const lost = typeof d.lost === "number" ? d.lost : 0;
      return mafia + civ + det + doc + boxer - lost;
    }

    function lobbyPlayersSorted() {
      // tie-break: original array order (assumes server sends players in join order)
      return (filteredPlayers() || [])
        .map((p, idx) => ({ p, idx }))
        .sort((a, b) => {
          const diff = getOverallPoints(b.p) - getOverallPoints(a.p);
          if (diff !== 0) return diff;
          return a.idx - b.idx;
        })
        .map((x) => x.p);
    }


    function sumRoleCounts() {
      return (
        (settings.mafia || 0) +
        (settings.doctor || 0) +
        (settings.detective || 0) +
        (settings.boxer || 0) +
        (settings.civilian || 0)
      );
    }

    function filteredPlayers() {
      // Return ALL players (including disconnected) for display purposes
      return players || [];
    }

    function connectedPlayers() {
      // Return only connected players for game logic (role validation, game start)
      return (players || []).filter((p) => !p.disconnected);
    }

    function formatPlayerCount() {
      const all = (players || []).length;
      const connected = connectedPlayers().length;
      if (all === 0) return "No players";
      if (connected === all) {
        return connected === 1 ? "1 player connected" : connected + " players connected";
      }
      return `${connected}/${all} players connected`;
    }

    function formatJoinUrl() {
      if (hostInfo.joinUrl) return hostInfo.joinUrl;
      const loc = window.location;
      return loc.protocol + "//" + loc.host + "/players";

      // Function to render the preset names list

          const emptyMsg = document.createElement("div");
          emptyMsg.className = "small-text";
          emptyMsg.textContent = "No preset names added yet.";
          listEl.appendChild(emptyMsg);
          return;
        }

        settings.presetNames.forEach((name, idx) => {
          const nameRow = document.createElement("div");
          nameRow.style.display = "flex";
          nameRow.style.justifyContent = "space-between";
          nameRow.style.alignItems = "center";
          nameRow.style.padding = "6px 10px";
          nameRow.style.borderRadius = "999px";
          nameRow.style.border = "1px solid rgba(55, 65, 81, 0.96)";

          nameText.textContent = name;
          nameRow.appendChild(nameText);

          removeBtn.className = "small danger";
          removeBtn.textContent = "Remove";
          removeBtn.onclick = () => {
            settings.presetNames.splice(idx, 1);
            socket.emit("host_update_settings", { presetNames: settings.presetNames });
            renderPresetNamesList();
            const errorEl = document.getElementById("presetNamesError");
            if (errorEl) errorEl.textContent = "";
          };
          nameRow.appendChild(removeBtn);

          listEl.appendChild(nameRow);

      // Function to add a preset name
      function addPresetName() {
        const input = document.getElementById("presetNameInput");
        const errorEl = document.getElementById("presetNamesError");
        const rawName = (input.value || "").trim();

        if (!rawName) {
          if (errorEl) errorEl.textContent = "";
          return;
        }

        // Normalize the name (Title Case like server does)
        function normalizeDisplayName(str) {
          return str.trim().split(/\s+/).map(w =>
            w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
          ).join(" ");
        }

        const name = normalizeDisplayName(rawName);

        // Check for duplicates (case-insensitive)
        const lower = name.toLowerCase();
        const isDuplicate = settings.presetNames.some(n => normalizeDisplayName(n).toLowerCase() === lower);

        if (isDuplicate) {
          if (errorEl) errorEl.textContent = "This name is already in the preset list.";
          return;
        }

        settings.presetNames.push(name);
        socket.emit("host_update_settings", { presetNames: settings.presetNames });
        input.value = "";
        if (errorEl) errorEl.textContent = "";
        renderPresetNamesList();
      }

      // Initial render
      renderPresetNamesList();

      addBtn.onclick = addPresetName;

      c.appendChild(pointsRow);

    // ===== SOCKET SETUP =====

    function setupSocket() {
      // Connect to game namespace
      const pathParts = window.location.pathname.split('/');
      const gameId = pathParts[2]; // e.g., "mafia"
      socket = io(gameId ? `/game/${gameId}` : '/');

      function registerHost() {
        socket.emit("host_join");
      }

      socket.on("connect", registerHost);

      if (socket.connected) {
        registerHost();
      }

      socket.on("lobby_update", (data) => {
        phase = data.phase || PHASES.LOBBY;
        players = data.players || [];
        settings = Object.assign(settings, data.settings || {});
        if (phase === PHASES.LOBBY) {
          day = 0;
          night = 0;
          lastNightInfo = null;
          lastVoteInfo = null;
          gameOverSummary = null;
          voteTimerEnd = null;
          lastError = "";
          clearIntroTimers();
        }
        render();
      });

      socket.on("host_error", (data) => {
        lastError =
          (data && data.message) || "Something went wrong on the host.";
        render();
      });

      socket.on("intro_phase_host", (data) => {
        phase = PHASES.INTRO;
        day = data.day || 0;
        night = data.night || 0;
        lastError = "";
        startIntroAnimation();
      });

      socket.on("night_phase_host", (data) => {
        phase = PHASES.NIGHT;
        if (data && Array.isArray(data.players)) players = data.players;
        day = data.day || day;
        night = data.night || night;
        settings = Object.assign(settings, data.settings || {});
        nightStatus = data.nightStatus || [];
        lastError = "";
        clearIntroTimers();
        render();
      });

      socket.on("night_status_update", (data) => {
        nightStatus = data.nightStatus || nightStatus;
        if (phase === PHASES.NIGHT) {
          render();
        }
      });

      socket.on("waiting_for_offline_player", (data) => {
        // Show notification banner for offline player
        if (phase === PHASES.NIGHT) {
          render(); // re-render to show skip buttons
        }
      });

      socket.on("host_notification", (data) => {
        if (data && data.message) {
          const banner = document.createElement("div");
          banner.className = "notification-banner";
          banner.style.cssText = "position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;z-index:9999;font-size:0.9em;opacity:1;transition:opacity 0.5s;";
          banner.style.background = data.type === "warning" ? "#a85d00" : "#2a6a3a";
          banner.style.color = "#fff";
          banner.textContent = data.message;
          document.body.appendChild(banner);
          setTimeout(() => { banner.style.opacity = "0"; }, 3000);
          setTimeout(() => { banner.remove(); }, 3500);
        }
      });

      socket.on("night_resolved_for_host", (data) => {
        lastNightInfo = data;
      });

      socket.on("day_phase", (data) => {
        phase = PHASES.DAY;
        if (data && Array.isArray(data.players)) players = data.players;
        day = data.day || day;
        night = data.night || night;
        lastError = "";
        render();
      });

      socket.on("vote_phase_host", (data) => {
        phase = PHASES.VOTE;
        // Keep player list (incl. alive/dead) in sync during the game
        if (data && Array.isArray(data.players)) players = data.players;
        day = data.day || day;
        night = data.night || night;
        settings = Object.assign(settings, data.settings || {});
        voteTimerEnd = data.voteTimerEnd || null;
        voteStatus = {};
        voteTargets = {};
        lastError = "";
        render();
      });

      socket.on("vote_status_update", (data) => {
        // server sends { voteStatus: {...} }
        voteStatus = (data && data.voteStatus) ? data.voteStatus : (data || {});
        voteTargets = (data && data.voteTargets) ? data.voteTargets : {};
        if (phase === PHASES.VOTE) {
          render();
        }
      });

      socket.on("vote_timer_started", (data) => {
        voteTimerEnd = data.voteTimerEnd || null;
        if (phase === PHASES.VOTE) {
          render();
        }
      });

      socket.on("vote_resolved_for_host", (data) => {
        lastVoteInfo = data;
      });

      socket.on("game_over", (summary) => {
        phase = PHASES.RESULTS;
        gameOverSummary = summary;
        lastError = "";
        render();
      });
    }

    // ===== HOST INFO (JOIN URL) =====

    async function fetchHostInfo() {
      try {
        const res = await fetch("/host-info");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const json = await res.json();
        hostInfo.ip = json.ip || null;
        hostInfo.port = json.port || null;
        hostInfo.joinUrl =
          (json.ip && json.port
            ? `${json.ip}:${json.port}${json.joinPath || "/players"}`
            : "") || "";
      } catch (e) {
        hostInfo.joinUrl = "";
      } finally {
        render();
      }
    }

      socket.emit("host_skip_intro"); // "Start Game" -> Night 1
    };

    $("introEndBtn").onclick = () => {
      socket.emit("host_reset_game");
    };

    $("returnToLauncherBtn").onclick = () => {
      $("returnToLauncherBtn").disabled = true;
      socket.emit("host_return_to_menu");
      const masterUrl = window.location.protocol + "//" + window.location.host + "/";
      setTimeout(() => { window.location.href = masterUrl; }, 100);
    };

    // ===== INIT =====

    fetchHostInfo();
    setupSocket();
    render();
  </script>
</body>

</html>
